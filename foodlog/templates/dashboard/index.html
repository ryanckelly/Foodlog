{% extends "base.html" %}

{% block content %}
<header class="topbar">
    <div class="brand">
        <span class="mark"><span class="dot"></span>FoodLog</span>
        <span class="date">{{ today.strftime('%A, %b %-d') }}</span>
    </div>

    <form class="segmented" role="radiogroup" aria-label="Date range">
        <input type="radio" id="r-today"     name="date_range" value="today"     checked
               hx-get="/dashboard/feed" hx-target="#dashboard-content" hx-trigger="change, load from:body">
        <label for="r-today">Today</label>

        <input type="radio" id="r-yesterday" name="date_range" value="yesterday"
               hx-get="/dashboard/feed" hx-target="#dashboard-content" hx-trigger="change">
        <label for="r-yesterday">Yesterday</label>

        <input type="radio" id="r-week"      name="date_range" value="week"
               hx-get="/dashboard/feed" hx-target="#dashboard-content" hx-trigger="change">
        <label for="r-week">7 days</label>
    </form>
</header>

<div id="dashboard-content">
    <div class="loading">Loading</div>
</div>
{% endblock %}
