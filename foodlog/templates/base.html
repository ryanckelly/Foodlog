<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Journal Gastronomique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --paper: #f0eae0;
            --paper-deep: #e7dfd1;
            --paper-fold: #ded4c2;
            --ink: #1f1d1a;
            --ink-soft: #403a33;
            --muted: #8a8378;
            --hairline: rgba(31, 29, 26, 0.22);
            --hairline-soft: rgba(31, 29, 26, 0.10);
            --vermillion: #c4441c;
            --moss: #5a6b3e;
            --plum: #6b2e4a;
            --ochre: #c97b1e;
            --slate: #4a5b6b;

            --meal-breakfast: var(--ochre);
            --meal-lunch: var(--moss);
            --meal-dinner: var(--plum);
            --meal-snack: var(--slate);

            --font-display: "Fraunces", "Times New Roman", serif;
            --font-body: "Instrument Serif", "Georgia", serif;
            --font-mono: "IBM Plex Mono", ui-monospace, monospace;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--paper);
            color: var(--ink);
            font-family: var(--font-body);
            font-size: 18px;
            line-height: 1.55;
            letter-spacing: 0.005em;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.11 0 0 0 0 0.10 0 0 0 0.35 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/></svg>");
            mix-blend-mode: multiply;
            opacity: 0.55;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99;
            background:
              radial-gradient(ellipse at top left, rgba(196,68,28,0.04), transparent 60%),
              radial-gradient(ellipse at bottom right, rgba(31,29,26,0.06), transparent 55%);
        }

        .page {
            max-width: 1160px;
            margin: 0 auto;
            padding: 3rem 2.5rem 6rem;
            position: relative;
            z-index: 1;
        }

        /* ── Masthead ──────────────────────────────────────────── */
        .masthead {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 2rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--ink);
            position: relative;
        }
        .masthead::after {
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: -5px;
            border-bottom: 1px solid var(--ink);
        }
        .masthead .meta-left,
        .masthead .meta-right {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--ink-soft);
            font-weight: 400;
        }
        .masthead .meta-left {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .masthead .meta-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            align-items: flex-end;
        }
        .masthead .title {
            font-family: var(--font-display);
            font-variation-settings: "opsz" 144, "wght" 380, "SOFT" 60, "WONK" 1;
            font-size: clamp(2.6rem, 5.8vw, 4.6rem);
            line-height: 0.95;
            text-align: center;
            margin: 0;
            font-style: normal;
            letter-spacing: -0.01em;
        }
        .masthead .title em {
            font-style: italic;
            font-variation-settings: "opsz" 144, "wght" 320, "SOFT" 100, "WONK" 1;
            color: var(--vermillion);
        }
        .masthead .rule-epigraph {
            text-align: center;
            font-family: var(--font-body);
            font-style: italic;
            color: var(--ink-soft);
            margin: 0.6rem 0 0;
            font-size: 1.05rem;
        }

        /* ── Ribbon / Date selector ───────────────────────────── */
        .ribbon {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            padding: 1.1rem 0;
            margin-top: 0.3rem;
            border-bottom: 1px solid var(--hairline);
        }
        .ribbon .label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .segmented {
            display: inline-flex;
            gap: 0;
            background: transparent;
            border: 1px solid var(--ink);
            border-radius: 999px;
            padding: 3px;
            position: relative;
        }
        .segmented input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }
        .segmented label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.55rem 1.1rem;
            border-radius: 999px;
            cursor: pointer;
            color: var(--ink-soft);
            transition: color 180ms ease, background-color 220ms ease;
            user-select: none;
        }
        .segmented input:checked + label {
            background: var(--ink);
            color: var(--paper);
        }
        .segmented label:hover { color: var(--vermillion); }
        .segmented input:checked + label:hover { color: var(--paper); }

        /* ── Hero ─────────────────────────────────────────────── */
        .hero {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 4rem;
            padding: 3rem 0 2.5rem;
            border-bottom: 1px solid var(--hairline);
            align-items: end;
        }
        .hero-figure {
            position: relative;
        }
        .hero-figure .kicker {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        .hero-figure .kcal {
            font-family: var(--font-display);
            font-variation-settings: "opsz" 144, "wght" 340, "SOFT" 50, "WONK" 1;
            font-size: clamp(6rem, 14vw, 11.5rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums lining-nums;
            color: var(--ink);
            margin: 0;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }
        .hero-figure .kcal sup {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--vermillion);
            font-weight: 500;
            position: relative;
            top: -3.2em;
        }
        .hero-figure .caption {
            font-family: var(--font-body);
            font-style: italic;
            font-size: 1.15rem;
            color: var(--ink-soft);
            max-width: 38ch;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid var(--hairline);
        }
        .hero-figure .caption b { font-style: normal; color: var(--ink); font-weight: 500; }

        /* ── Macro column ────────────────────────────────────── */
        .macro-panel {
            border-left: 1px solid var(--hairline);
            padding-left: 3rem;
        }
        .macro-panel .section-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.4rem;
        }
        .macro-bar {
            display: flex;
            width: 100%;
            height: 10px;
            border: 1px solid var(--ink);
            overflow: hidden;
            margin-bottom: 1.6rem;
            background: var(--paper);
        }
        .macro-bar .seg { height: 100%; transition: width 500ms cubic-bezier(0.22, 0.8, 0.3, 1); }
        .macro-bar .seg-p { background: var(--vermillion); }
        .macro-bar .seg-c { background: var(--moss); }
        .macro-bar .seg-f { background: var(--ink); }

        .macro-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 1.2rem;
        }
        .macro-list li {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: baseline;
            gap: 1rem;
            padding-bottom: 0.9rem;
            border-bottom: 1px solid var(--hairline-soft);
        }
        .macro-list li:last-child { border-bottom: none; padding-bottom: 0; }
        .macro-list .swatch {
            width: 10px; height: 10px; display: inline-block;
            transform: translateY(-1px);
        }
        .macro-list .swatch-p { background: var(--vermillion); }
        .macro-list .swatch-c { background: var(--moss); }
        .macro-list .swatch-f { background: var(--ink); }
        .macro-list .name {
            font-family: var(--font-body);
            font-style: italic;
            font-size: 1.05rem;
            color: var(--ink-soft);
            text-transform: lowercase;
            letter-spacing: 0.02em;
        }
        .macro-list .value {
            font-family: var(--font-display);
            font-variation-settings: "opsz" 36, "wght" 400, "SOFT" 50;
            font-size: 1.7rem;
            font-variant-numeric: tabular-nums;
            color: var(--ink);
        }
        .macro-list .value .unit {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-left: 0.3rem;
        }
        .macro-list .pct {
            grid-column: 2 / -1;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            color: var(--muted);
            margin-top: 0.2rem;
        }

        /* ── Body grid ───────────────────────────────────────── */
        .body-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 4rem;
            padding-top: 2.5rem;
        }

        /* ── Courses (timeline) ──────────────────────────────── */
        .column-heading {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-bottom: 1px solid var(--ink);
            padding-bottom: 0.6rem;
            margin-bottom: 1.8rem;
        }
        .column-heading h3 {
            font-family: var(--font-display);
            font-variation-settings: "opsz" 36, "wght" 400, "SOFT" 60, "WONK" 1;
            font-size: 1.9rem;
            font-style: italic;
            margin: 0;
            letter-spacing: -0.01em;
        }
        .column-heading .count {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .courses { list-style: none; margin: 0; padding: 0; counter-reset: course; }
        .course {
            counter-increment: course;
            padding: 1.6rem 0 1.8rem;
            border-bottom: 1px solid var(--hairline);
            position: relative;
            animation: riseIn 700ms cubic-bezier(0.22, 0.8, 0.3, 1) both;
        }
        .course:last-child { border-bottom: none; }
        .course:nth-child(1) { animation-delay: 40ms; }
        .course:nth-child(2) { animation-delay: 100ms; }
        .course:nth-child(3) { animation-delay: 160ms; }
        .course:nth-child(4) { animation-delay: 220ms; }
        .course:nth-child(5) { animation-delay: 280ms; }
        .course:nth-child(n+6) { animation-delay: 340ms; }

        .course-head {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: baseline;
            gap: 1.25rem;
            margin-bottom: 1.1rem;
        }
        .course-ordinal {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }
        .course-ordinal::before {
            content: "Course " counter(course, upper-roman);
        }
        .course-ordinal .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }
        .course[data-meal="breakfast"] .dot { background: var(--meal-breakfast); }
        .course[data-meal="lunch"]     .dot { background: var(--meal-lunch); }
        .course[data-meal="dinner"]    .dot { background: var(--meal-dinner); }
        .course[data-meal="snack"]     .dot { background: var(--meal-snack); }

        .course[data-meal="breakfast"] .course-meal { color: var(--meal-breakfast); }
        .course[data-meal="lunch"]     .course-meal { color: var(--meal-lunch); }
        .course[data-meal="dinner"]    .course-meal { color: var(--meal-dinner); }
        .course[data-meal="snack"]     .course-meal { color: var(--meal-snack); }

        .course-title {
            font-family: var(--font-display);
            font-variation-settings: "opsz" 72, "wght" 420, "SOFT" 40, "WONK" 1;
            font-size: 1.6rem;
            line-height: 1.15;
            margin: 0;
            letter-spacing: -0.015em;
            font-style: italic;
        }
        .course-meal {
            font-style: italic;
            font-weight: 400;
        }
        .course-time-kcal {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.15rem;
        }
        .course-time {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .course-kcal {
            font-family: var(--font-display);
            font-variation-settings: "opsz" 48, "wght" 440, "SOFT" 40;
            font-size: 1.55rem;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .course-kcal .unit {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-left: 0.28rem;
        }

        .course-entries {
            list-style: none;
            margin: 0 0 1.2rem;
            padding: 0;
        }
        .course-entries li {
            display: grid;
            grid-template-columns: 1.2rem 1fr auto auto;
            align-items: baseline;
            gap: 0.8rem;
            padding: 0.45rem 0;
            border-bottom: 1px dashed var(--hairline-soft);
            font-family: var(--font-body);
        }
        .course-entries li:last-child { border-bottom: none; }
        .course-entries .bullet {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0;
        }
        .course-entries .food {
            font-size: 1.08rem;
            color: var(--ink);
        }
        .course-entries .qty {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
        }
        .course-entries .entry-kcal {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }

        .course-macros {
            display: flex;
            gap: 1.4rem;
            padding-top: 0.6rem;
            border-top: 1px solid var(--hairline-soft);
        }
        .course-macro {
            display: flex;
            align-items: baseline;
            gap: 0.45rem;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .course-macro b {
            font-weight: 500;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
        }

        /* ── Side column ─────────────────────────────────────── */
        .side {
            border-left: 1px solid var(--hairline);
            padding-left: 3rem;
        }
        .side-block { margin-bottom: 2.6rem; }
        .side-block .section-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--hairline);
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.45rem 0;
            border-bottom: 1px dotted var(--hairline-soft);
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-row .k {
            font-style: italic;
            color: var(--ink-soft);
            font-size: 1.02rem;
        }
        .stat-row .v {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
        }

        /* ── Empty state ─────────────────────────────────────── */
        .empty {
            padding: 4rem 0;
            text-align: center;
            font-family: var(--font-body);
            font-style: italic;
            color: var(--muted);
            font-size: 1.3rem;
            letter-spacing: 0.01em;
        }
        .empty::before { content: "— "; }
        .empty::after { content: " —"; }

        /* ── Loading ─────────────────────────────────────────── */
        .loading {
            padding: 4rem 0;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .loading::after {
            content: "";
            display: inline-block;
            animation: dots 1.4s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ""; }
            25%  { content: "."; }
            50%  { content: ".."; }
            75%  { content: "..."; }
            100% { content: ""; }
        }

        @keyframes riseIn {
            0%   { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .htmx-swapping { opacity: 0; transition: opacity 120ms ease; }
        .htmx-settling { opacity: 1; transition: opacity 240ms ease; }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 860px) {
            .page { padding: 2rem 1.25rem 4rem; }
            .masthead {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 0.6rem;
            }
            .masthead .meta-right { align-items: center; text-align: center; }
            .ribbon { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
            .hero { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 0; }
            .macro-panel { border-left: none; border-top: 1px solid var(--hairline); padding: 2rem 0 0; }
            .body-grid { grid-template-columns: 1fr; gap: 2.5rem; }
            .side { border-left: none; border-top: 1px solid var(--hairline); padding: 2rem 0 0; }
            .course-head { grid-template-columns: 1fr; gap: 0.35rem; }
            .course-time-kcal { flex-direction: row; justify-content: space-between; align-items: baseline; }
        }
    </style>
</head>
<body>
    <div class="page">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
