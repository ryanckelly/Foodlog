<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #ffffff;
            --bg-sunk: #f6f5f4;
            --ink: rgba(0, 0, 0, 0.95);
            --ink-soft: #31302e;
            --muted: #615d59;
            --hairline: rgba(0, 0, 0, 0.1);
            --hairline-soft: rgba(0, 0, 0, 0.04);
            --accent: #0075de;

            --meal-breakfast: #dd5b00;
            --meal-lunch:     #1aae39;
            --meal-dinner:    #391c57;
            --meal-snack:     #2a9d99;

            --font-serif: "Inter", -apple-system, system-ui, sans-serif;
            --font-sans:  "Inter", -apple-system, system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--font-sans);
            font-size: 16px;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            font-variant-numeric: tabular-nums;
        }

        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 2.5rem 1.75rem 5rem;
        }

        /* ── Top bar ─────────────────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--hairline);
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
        }
        .brand .mark {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 1.25rem;
            letter-spacing: -0.01em;
        }
        .brand .mark .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            transform: translateY(-3px);
            margin-right: 0.1rem;
        }
        .brand .date {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1rem;
            color: var(--ink-soft);
            letter-spacing: 0.01em;
        }

        .segmented {
            display: inline-flex;
            background: var(--bg-sunk);
            border-radius: 999px;
            padding: 3px;
        }
        .segmented input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
        .segmented label {
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            padding: 0.4rem 0.95rem;
            border-radius: 999px;
            cursor: pointer;
            color: var(--ink-soft);
            transition: color 160ms ease, background-color 220ms ease;
            user-select: none;
        }
        .segmented input:checked + label {
            background: var(--bg);
            color: var(--ink);
            box-shadow: 0 1px 2px rgba(28,28,26,0.05);
        }
        .segmented label:hover { color: var(--ink); }

        /* ── Summary strip ──────────────────────────────────── */
        .summary {
            padding: 2rem 0 1.75rem;
            border-bottom: 1px solid var(--hairline);
        }
        .summary-row {
            display: flex;
            align-items: baseline;
            gap: 2.5rem;
            flex-wrap: wrap;
        }
        .summary-kcal {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }
        .summary-kcal .num {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 2.8rem;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .summary-kcal .unit {
            font-size: 0.82rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .summary-macros {
            display: flex;
            gap: 1.4rem;
            flex-wrap: wrap;
        }
        .summary-macros .m {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            font-size: 0.95rem;
        }
        .summary-macros .m .swatch {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; transform: translateY(-1px);
        }
        .summary-macros .m .val { font-weight: 500; color: var(--ink); }
        .summary-macros .m .lbl { color: var(--muted); font-size: 0.82rem; letter-spacing: 0.02em; }
        .swatch-p { background: #dd5b00; }
        .swatch-c { background: #1aae39; }
        .swatch-f { background: rgba(0, 0, 0, 0.85); }

        .macro-bar {
            display: flex;
            height: 4px;
            margin-top: 1.1rem;
            border-radius: 2px;
            overflow: hidden;
            background: var(--bg-sunk);
        }
        .macro-bar .seg { height: 100%; transition: width 400ms cubic-bezier(0.22,0.8,0.3,1); }
        .macro-bar .seg-p { background: #dd5b00; }
        .macro-bar .seg-c { background: #1aae39; }
        .macro-bar .seg-f { background: rgba(0, 0, 0, 0.85); }

        .summary-meta {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--muted);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .summary-meta .k { color: var(--muted); }
        .summary-meta .v { color: var(--ink-soft); font-weight: 500; }

        /* ── Meals section ──────────────────────────────────── */
        .section-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 1.75rem 0 1rem;
        }
        .section-head h2 {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 1.05rem;
            margin: 0;
            letter-spacing: 0.02em;
            color: var(--ink-soft);
        }
        .section-head .count {
            font-size: 0.82rem;
            color: var(--muted);
        }

        .meals { list-style: none; margin: 0; padding: 0; }
        .meal {
            padding: 1.15rem 0 1.25rem;
            border-top: 1px solid var(--hairline);
            animation: fadeIn 380ms cubic-bezier(0.22,0.8,0.3,1) both;
        }
        .meal:last-child { border-bottom: 1px solid var(--hairline); }
        .meal:nth-child(1) { animation-delay: 20ms; }
        .meal:nth-child(2) { animation-delay: 60ms; }
        .meal:nth-child(3) { animation-delay: 100ms; }
        .meal:nth-child(4) { animation-delay: 140ms; }
        .meal:nth-child(n+5) { animation-delay: 180ms; }

        .meal-head {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: baseline;
            gap: 0.9rem;
            margin-bottom: 0.75rem;
        }
        .meal-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            align-self: center;
        }
        .meal[data-meal="breakfast"] .meal-dot { background: var(--meal-breakfast); }
        .meal[data-meal="lunch"]     .meal-dot { background: var(--meal-lunch); }
        .meal[data-meal="dinner"]    .meal-dot { background: var(--meal-dinner); }
        .meal[data-meal="snack"]     .meal-dot { background: var(--meal-snack); }

        .meal-name {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 1.12rem;
            letter-spacing: -0.005em;
        }
        .meal-time {
            font-size: 0.82rem;
            color: var(--muted);
            letter-spacing: 0.02em;
        }
        .meal-kcal {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 1.05rem;
            color: var(--ink);
        }
        .meal-kcal .unit {
            font-family: var(--font-sans);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.04em;
            margin-left: 0.2rem;
            text-transform: uppercase;
        }

        .meal-entries {
            list-style: none;
            margin: 0 0 0.6rem;
            padding: 0 0 0 1rem;
        }
        .meal-entries li {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: baseline;
            gap: 0.9rem;
            padding: 0.35rem 0;
            font-size: 0.95rem;
        }
        .meal-entries .food { color: var(--ink); }
        .meal-entries .qty {
            color: var(--muted);
            font-size: 0.82rem;
        }
        .meal-entries .kcal {
            color: var(--ink-soft);
            font-size: 0.88rem;
            font-variant-numeric: tabular-nums;
            min-width: 3ch;
            text-align: right;
        }

        .meal-macros {
            padding: 0 0 0 1rem;
            display: flex;
            gap: 1.2rem;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .meal-macros span b {
            color: var(--ink-soft);
            font-weight: 500;
            margin-left: 0.2rem;
        }

        /* ── Empty / loading ─────────────────────────────────── */
        .empty {
            padding: 3.5rem 0;
            text-align: center;
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--muted);
            font-size: 1rem;
        }
        .loading {
            padding: 3rem 0;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
        }
        .loading::after {
            content: "";
            display: inline-block;
            width: 1.2em;
            text-align: left;
            animation: dots 1.2s steps(4,end) infinite;
        }
        @keyframes dots {
            0%   { content: ""; }
            25%  { content: "·"; }
            50%  { content: "··"; }
            75%  { content: "···"; }
            100% { content: ""; }
        }

        @keyframes fadeIn {
            0%   { opacity: 0; transform: translateY(4px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .htmx-swapping { opacity: 0; transition: opacity 120ms ease; }
        .htmx-settling { opacity: 1; transition: opacity 220ms ease; }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 640px) {
            .page { padding: 1.5rem 1rem 3rem; }
            .topbar { flex-direction: column; align-items: flex-start; }
            .summary-row { gap: 1.4rem; }
            .summary-kcal .num { font-size: 2.3rem; }
            .meal-head { grid-template-columns: auto 1fr auto; }
            .meal-head .meal-time { grid-column: 2 / -1; font-size: 0.78rem; }
        }

        /* ── Movement & Recovery ─────────────────────────────── */
        .movement-section { padding-top: 8px; }
        .movement-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .mv-card {
            padding: 16px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            box-shadow: rgba(0,0,0,0.04) 0 4px 18px, rgba(0,0,0,0.027) 0 2.025px 7.85px,
                        rgba(0,0,0,0.02) 0 0.8px 2.93px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .mv-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #615d59;
        }
        .mv-card-big {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.0;
        }
        .mv-card-sub {
            font-size: 12px;
            color: #a39e98;
            font-weight: 400;
        }
        .mv-hr-chart {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 32px;
        }
        .mv-hr-chart span {
            flex: 1;
            background: #0075de;
            opacity: 0.75;
            border-radius: 1px;
        }

        /* ── Connect page ────────────────────────────────────── */
        .connect-prompt {
            max-width: 540px;
            margin: 80px auto;
            text-align: center;
        }
        .connect-prompt h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1.0px;
            margin-bottom: 8px;
        }
        .connect-prompt p {
            color: #615d59;
            font-size: 16px;
            margin-bottom: 24px;
        }
        .connect-prompt .primary-btn {
            display: inline-block;
            background: #0075de;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
        }
        .connect-prompt .primary-btn:hover { background: #005bab; }
        .connect-prompt .fine-print {
            margin-top: 32px;
            font-size: 12px;
            color: #a39e98;
        }

        /* ── Reconnect banner ────────────────────────────────── */
        .reconnect-banner {
            padding: 10px 14px;
            background: #f2f9ff;
            color: #097fe8;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .reconnect-banner.stale {
            background: #f6f5f4;
            color: #615d59;
        }
        .reconnect-banner a {
            color: #0075de;
            text-decoration: underline;
        }

        /* ── Net-calories badge ──────────────────────────────── */
        .net-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            background: #f2f9ff;
            color: #097fe8;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.125px;
        }
    </style>
</head>
<body>
    <div class="page">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
