<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0075de">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FoodLog">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=2">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js').catch(function () {});
            });
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #ffffff;
            --bg-sunk: #f6f5f4;
            --ink: rgba(0, 0, 0, 0.95);
            --ink-soft: #31302e;
            --muted: #615d59;
            --hairline: rgba(0, 0, 0, 0.1);
            --hairline-soft: rgba(0, 0, 0, 0.04);
            --accent: #0075de;

            --meal-breakfast: #dd5b00;
            --meal-lunch:     #1aae39;
            --meal-dinner:    #391c57;
            --meal-snack:     #2a9d99;

            --metric-hr:        #c75e3c;
            --metric-hr-soft:   rgba(199, 94, 60, 0.12);
            --metric-steps:     var(--accent);
            --metric-distance:  #5a8e7c;
            --metric-floors:    #b88e54;
            --metric-azm-light: rgba(199, 94, 60, 0.45);
            --metric-azm-mid:   rgba(199, 94, 60, 0.75);
            --metric-azm-peak:  #c75e3c;
            --marker-meal:      var(--meal-breakfast);

            --font-serif: "Inter", -apple-system, system-ui, sans-serif;
            --font-sans:  "Inter", -apple-system, system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--font-sans);
            font-size: 16px;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            font-variant-numeric: tabular-nums;
        }

        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 2.5rem 1.75rem 5rem;
        }

        /* ── Top bar ─────────────────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--hairline);
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .brand {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
        }
        .brand .mark {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 1.25rem;
            letter-spacing: -0.01em;
        }
        .brand .mark .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            transform: translateY(-3px);
            margin-right: 0.1rem;
        }
        .brand .date {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1rem;
            color: var(--ink-soft);
            letter-spacing: 0.01em;
        }

        .segmented {
            display: inline-flex;
            background: var(--bg-sunk);
            border-radius: 999px;
            padding: 3px;
        }
        .segmented input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; }
        .segmented label {
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            padding: 0.4rem 0.95rem;
            border-radius: 999px;
            cursor: pointer;
            color: var(--ink-soft);
            transition: color 160ms ease, background-color 220ms ease;
            user-select: none;
        }
        .segmented input:checked + label {
            background: var(--bg);
            color: var(--ink);
            box-shadow: 0 1px 2px rgba(28,28,26,0.05);
        }
        .segmented label:hover { color: var(--ink); }

        /* ── Summary strip ──────────────────────────────────── */
        .summary {
            padding: 2rem 0 1.75rem;
            border-bottom: 1px solid var(--hairline);
        }
        .summary-row {
            display: flex;
            align-items: baseline;
            gap: 2.5rem;
            flex-wrap: wrap;
        }
        .summary-kcal {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }
        .summary-kcal .num {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 2.8rem;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .summary-kcal .unit {
            font-size: 0.82rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .summary-macros {
            display: flex;
            gap: 1.4rem;
            flex-wrap: wrap;
        }
        .summary-macros .m {
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            font-size: 0.95rem;
        }
        .summary-macros .m .swatch {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; transform: translateY(-1px);
        }
        .summary-macros .m .val { font-weight: 500; color: var(--ink); }
        .summary-macros .m .lbl { color: var(--muted); font-size: 0.82rem; letter-spacing: 0.02em; }
        .swatch-p { background: #dd5b00; }
        .swatch-c { background: #1aae39; }
        .swatch-f { background: rgba(0, 0, 0, 0.85); }

        .macro-bar {
            display: flex;
            height: 4px;
            margin-top: 1.1rem;
            border-radius: 2px;
            overflow: hidden;
            background: var(--bg-sunk);
        }
        .macro-bar .seg { height: 100%; transition: width 400ms cubic-bezier(0.22,0.8,0.3,1); }
        .macro-bar .seg-p { background: #dd5b00; }
        .macro-bar .seg-c { background: #1aae39; }
        .macro-bar .seg-f { background: rgba(0, 0, 0, 0.85); }

        .summary-meta {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--muted);
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .summary-meta .k { color: var(--muted); }
        .summary-meta .v { color: var(--ink-soft); font-weight: 500; }

        /* ── Meals section ──────────────────────────────────── */
        .section-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 1.75rem 0 1rem;
        }
        .section-head h2 {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 1.05rem;
            margin: 0;
            letter-spacing: 0.02em;
            color: var(--ink-soft);
        }
        .section-head .count {
            font-size: 0.82rem;
            color: var(--muted);
        }

        .meals { list-style: none; margin: 0; padding: 0; }
        .meal {
            padding: 1.15rem 0 1.25rem;
            border-top: 1px solid var(--hairline);
            animation: fadeIn 380ms cubic-bezier(0.22,0.8,0.3,1) both;
        }
        .meal:last-child { border-bottom: 1px solid var(--hairline); }
        .meal:nth-child(1) { animation-delay: 20ms; }
        .meal:nth-child(2) { animation-delay: 60ms; }
        .meal:nth-child(3) { animation-delay: 100ms; }
        .meal:nth-child(4) { animation-delay: 140ms; }
        .meal:nth-child(n+5) { animation-delay: 180ms; }

        .meal-head {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: baseline;
            gap: 0.9rem;
            margin-bottom: 0.75rem;
        }
        .meal-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            align-self: center;
        }
        .meal[data-meal="breakfast"] .meal-dot { background: var(--meal-breakfast); }
        .meal[data-meal="lunch"]     .meal-dot { background: var(--meal-lunch); }
        .meal[data-meal="dinner"]    .meal-dot { background: var(--meal-dinner); }
        .meal[data-meal="snack"]     .meal-dot { background: var(--meal-snack); }

        .meal-name {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 1.12rem;
            letter-spacing: -0.005em;
        }
        .meal-time {
            font-size: 0.82rem;
            color: var(--muted);
            letter-spacing: 0.02em;
        }
        .meal-kcal {
            font-family: var(--font-serif);
            font-weight: 500;
            font-size: 1.05rem;
            color: var(--ink);
        }
        .meal-kcal .unit {
            font-family: var(--font-sans);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.04em;
            margin-left: 0.2rem;
            text-transform: uppercase;
        }

        .meal-entries {
            list-style: none;
            margin: 0 0 0.6rem;
            padding: 0 0 0 1rem;
        }
        .meal-entries li {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: baseline;
            gap: 0.9rem;
            padding: 0.35rem 0;
            font-size: 0.95rem;
        }
        .meal-entries .food { color: var(--ink); }
        .meal-entries .qty {
            color: var(--muted);
            font-size: 0.82rem;
        }
        .meal-entries .kcal {
            color: var(--ink-soft);
            font-size: 0.88rem;
            font-variant-numeric: tabular-nums;
            min-width: 3ch;
            text-align: right;
        }

        .meal-macros {
            padding: 0 0 0 1rem;
            display: flex;
            gap: 1.2rem;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .meal-macros span b {
            color: var(--ink-soft);
            font-weight: 500;
            margin-left: 0.2rem;
        }

        /* ── Empty / loading ─────────────────────────────────── */
        .empty {
            padding: 3.5rem 0;
            text-align: center;
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--muted);
            font-size: 1rem;
        }
        .loading {
            padding: 3rem 0;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
        }
        .loading::after {
            content: "";
            display: inline-block;
            width: 1.2em;
            text-align: left;
            animation: dots 1.2s steps(4,end) infinite;
        }
        @keyframes dots {
            0%   { content: ""; }
            25%  { content: "·"; }
            50%  { content: "··"; }
            75%  { content: "···"; }
            100% { content: ""; }
        }

        @keyframes fadeIn {
            0%   { opacity: 0; transform: translateY(4px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .htmx-swapping { opacity: 0; transition: opacity 120ms ease; }
        .htmx-settling { opacity: 1; transition: opacity 220ms ease; }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 640px) {
            .page { padding: 1.5rem 1rem 3rem; }
            .topbar { flex-direction: column; align-items: flex-start; }
            .summary-row { gap: 1.4rem; }
            .summary-kcal .num { font-size: 2.3rem; }
            .meal-head { grid-template-columns: auto 1fr auto; }
            .meal-head .meal-time { grid-column: 2 / -1; font-size: 0.78rem; }
        }

        /* ── Movement & Recovery ─────────────────────────────── */
        .movement-section { padding-top: 8px; }
        .movement-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .mv-card {
            padding: 16px;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            box-shadow: rgba(0,0,0,0.04) 0 4px 18px, rgba(0,0,0,0.027) 0 2.025px 7.85px,
                        rgba(0,0,0,0.02) 0 0.8px 2.93px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .mv-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #615d59;
        }
        .mv-card-big {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.0;
        }
        .mv-card-sub {
            font-size: 12px;
            color: #a39e98;
            font-weight: 400;
        }
        .mv-hr-chart {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 32px;
        }
        .mv-hr-chart span {
            flex: 1;
            background: #0075de;
            opacity: 0.75;
            border-radius: 1px;
        }

        /* ── Connect page ────────────────────────────────────── */
        .connect-prompt {
            max-width: 540px;
            margin: 80px auto;
            text-align: center;
        }
        .connect-prompt h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1.0px;
            margin-bottom: 8px;
        }
        .connect-prompt p {
            color: #615d59;
            font-size: 16px;
            margin-bottom: 24px;
        }
        .connect-prompt .primary-btn {
            display: inline-block;
            background: #0075de;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
        }
        .connect-prompt .primary-btn:hover { background: #005bab; }
        .connect-prompt .fine-print {
            margin-top: 32px;
            font-size: 12px;
            color: #a39e98;
        }

        /* ── Reconnect banner ────────────────────────────────── */
        .reconnect-banner {
            padding: 10px 14px;
            background: #f2f9ff;
            color: #097fe8;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .reconnect-banner.stale {
            background: #f6f5f4;
            color: #615d59;
        }
        .reconnect-banner a {
            color: #0075de;
            text-decoration: underline;
        }

        /* ── Net-calories badge ──────────────────────────────── */
        .net-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            background: #f2f9ff;
            color: #097fe8;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.125px;
        }

        /* ── Timeline ───────────────────────────────────────── */
        .timeline-section { padding: 1rem 0; }
        .tl-panel { margin-bottom: 1rem; }
        .tl-panel-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 0.4rem;
        }
        .tl-panel-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }
        .tl-panel-axis {
            font-size: 0.7rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }
        .tl-chart {
            position: relative;
            display: grid;
            grid-template-columns: repeat(96, 1fr);
            gap: 1px;
            height: 110px;
            background: var(--bg-sunk);
            padding: 4px;
            border-radius: 4px;
        }
        .tl-col {
            position: relative;
            min-height: 0;
        }
        .tl-col-empty { background: transparent; }
        .hr-col, .steps-col, .dist-col, .floors-col, .azm-col {
            position: relative;
            min-height: 0;
        }
        .hr-col .hr-range {
            position: absolute;
            left: 0; right: 0;
            background: var(--metric-hr-soft);
            border-radius: 1px;
        }
        .hr-col .hr-dot {
            position: absolute;
            left: 50%;
            transform: translate(-50%, 50%);
            width: 3px; height: 3px;
            background: var(--metric-hr);
            border-radius: 50%;
        }
        .bar-fill {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            border-radius: 1px 1px 0 0;
        }
        .bar-steps    { background: var(--metric-steps); }
        .bar-distance { background: var(--metric-distance); }
        .bar-floors   { background: var(--metric-floors); }
        .azm-fat-burn { background: var(--metric-azm-light); }
        .azm-cardio   { background: var(--metric-azm-mid); }
        .azm-peak     { background: var(--metric-azm-peak); }

        .tl-meal-strip {
            position: relative;
            height: var(--meal-strip-h, 18px);
            margin-bottom: 6px;
        }
        button.tl-meal-dot {
            position: absolute;
            top: 4px;
            width: 9px; height: 9px;
            padding: 0;
            border: none;
            border-radius: 50%;
            transform: translateX(-50%);
            background: var(--marker-meal);
            box-shadow: 0 0 0 2px var(--bg);
            cursor: pointer;
        }
        button.tl-meal-dot:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
        .tl-meal-tip {
            display: none;
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--ink-soft);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid var(--hairline);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            z-index: 6;
        }
        button.tl-meal-dot:hover .tl-meal-tip,
        button.tl-meal-dot:focus .tl-meal-tip { display: block; }
        .tl-meal-dot.tl-meal-breakfast { background: var(--meal-breakfast); }
        .tl-meal-dot.tl-meal-lunch     { background: var(--meal-lunch); }
        .tl-meal-dot.tl-meal-dinner    { background: var(--meal-dinner); }
        .tl-meal-dot.tl-meal-snack     { background: var(--meal-snack); }

        .tl-workout-band {
            position: absolute;
            top: 0; bottom: 0;
            background: var(--metric-hr-soft);
            border-left: 1px solid rgba(199, 94, 60, 0.35);
            border-right: 1px solid rgba(199, 94, 60, 0.35);
            z-index: 1;
            pointer-events: none;
        }
        .tl-workout-focused {
            background: rgba(199, 94, 60, 0.22);
            border-left: 2px solid var(--metric-hr);
            border-right: 2px solid var(--metric-hr);
        }
        .tl-workout-label {
            position: absolute;
            top: 4px;
            font-size: 10px;
            font-weight: 500;
            color: var(--metric-hr);
            background: rgba(255, 255, 255, 0.92);
            padding: 1px 6px;
            border-radius: 3px;
            z-index: 3;
            white-space: nowrap;
        }
        .hr-col, .steps-col, .dist-col, .floors-col, .azm-col {
            z-index: 2;  /* on top of workout band */
        }

        .tl-gridlines {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .tl-gridlines > span {
            position: absolute;
            left: 0; right: 0;
            height: 0;
            border-top: 1px dashed rgba(0, 0, 0, 0.08);
        }
        .tl-gridlines > span:nth-child(1) { bottom: 25%; }
        .tl-gridlines > span:nth-child(2) { bottom: 50%; }
        .tl-gridlines > span:nth-child(3) { bottom: 75%; }

        .tl-y-axis {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 4;
            font-size: 9px;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .tl-y-axis > span {
            position: absolute;
            left: 2px;
            background: var(--bg-sunk);
            padding: 1px 4px;
            border-radius: 2px;
            white-space: nowrap;
            transform: translateY(50%);
        }
        .tl-y-axis > span:nth-child(1) { bottom: 25%; }
        .tl-y-axis > span:nth-child(2) { bottom: 50%; }
        .tl-y-axis > span:nth-child(3) { bottom: 75%; }
        .tl-y-axis > span:nth-child(4) { bottom: 100%; }

        .tl-xaxis {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            padding: 0 2px;
            font-size: 0.65rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.04em;
        }

        .topbar-link {
            font-size: 0.85rem;
            color: var(--accent);
            text-decoration: none;
            padding: 0.25rem 0.6rem;
            border: 1px solid var(--accent);
            border-radius: 999px;
            white-space: nowrap;
        }
        .topbar-link:hover { background: var(--accent); color: white; }

        /* ── Timeline date navigation ───────────────────────── */
        .tl-topbar {
            justify-content: space-between;
        }
        .tl-nav {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .tl-nav a {
            color: var(--ink-soft);
            text-decoration: none;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
        }
        .tl-nav a:hover { background: var(--bg-sunk); }
        .tl-nav-prev, .tl-nav-next {
            font-size: 1.4rem;
            line-height: 1;
        }
        .tl-nav-picker {
            position: relative;
        }
        .tl-nav-day {
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.2rem 0.4rem;
        }
        .tl-nav-picker input[type="date"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            font-family: inherit;
        }
        .tl-nav-today {
            font-size: 0.85rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 999px;
            padding: 0.15rem 0.7rem;
        }

        /* Pills hidden in portrait */
        .tl-pill-strip { display: none; }

        @media (orientation: landscape) and (max-width: 1024px) {
            .tl-pill-strip {
                display: flex;
                gap: 0.4rem;
                padding: 0.4rem 0;
                overflow-x: auto;
                margin-bottom: 0.5rem;
            }
            .tl-pill {
                font-size: 0.8rem;
                padding: 0.3rem 0.7rem;
                border-radius: 999px;
                background: var(--bg-sunk);
                color: var(--ink-soft);
                text-decoration: none;
                white-space: nowrap;
            }
            .tl-pill:focus,
            .tl-pill:hover {
                background: var(--accent);
                color: white;
            }
            /* In landscape, hide all panels by default; show the targeted one */
            .timeline-section .tl-panel { display: none; }
            .timeline-section .tl-panel:target { display: block; }
            /* Default to HR when no hash */
            .timeline-section:not(:has(.tl-panel:target)) #tl-hr { display: block; }
            /* The targeted panel takes the full viewport */
            .tl-panel:target .tl-chart { height: 60vh; }
        }

        .mv-card-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
            margin-top: 0.4rem;
        }
        .mv-card-link:hover { text-decoration: underline; }

        .tl-empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
        }
        .tl-empty p { margin: 0.4rem 0; }
        .tl-empty-sub { font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="page">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
